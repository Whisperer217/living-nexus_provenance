<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Living Nexus</title>

    <!-- Primary favicon -->
    <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663123503966/7kHkqvMBX9Ci3pQfWTqqQr/living-nexus-icon_d108b3b1.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Living Nexus" />
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663123503966/7kHkqvMBX9Ci3pQfWTqqQr/icon-192x192_ec4bd177.png" />

    <!-- Android / browser theme -->
    <meta name="theme-color" content="#080d14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Living Nexus" />

    <!-- SEO / social -->
    <meta name="description" content="Sovereign music. Cryptographic provenance. Creator-owned." />

    <!--
      oEmbed discovery — Discord, Slack, and other platforms read this link tag
      and call /api/oembed?url={page_url} to get song/creator-specific metadata.
      This bypasses the Manus CDN's generic OG tag override because /api/* routes
      are forwarded directly to the Express server.
    -->
    <link
      rel="alternate"
      type="application/json+oembed"
      href="https://www.livingnexus.org/api/oembed?url=https://www.livingnexus.org/"
      title="Living Nexus oEmbed"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <!-- Service Worker registration — production grade -->
    <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      // ── Gold update banner ──────────────────────────────────────────────────
      function showUpdateBanner() {
        if (document.getElementById('ln-update-banner')) return;
        var banner = document.createElement('div');
        banner.id = 'ln-update-banner';
        banner.style.cssText = [
          'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',
          'background:#D4AF37', 'color:#080d14',
          'font-family:Cinzel,serif', 'font-size:13px', 'font-weight:700',
          'letter-spacing:0.06em', 'text-align:center',
          'padding:10px 16px', 'cursor:pointer',
          'box-shadow:0 2px 12px rgba(212,175,55,0.4)',
        ].join(';');
        banner.textContent = '\u2728 Living Nexus has been updated \u2014 tap to refresh';
        banner.addEventListener('click', function () { window.location.reload(); });
        document.body.prepend(banner);
      }

      // ── Listen for SW_UPDATED message ──────────────────────────────────────
      navigator.serviceWorker.addEventListener('message', function (event) {
        if (event.data && event.data.type === 'SW_UPDATED') {
          showUpdateBanner();
        }
      });

      window.addEventListener('load', function () {
        // Step 1: Unregister ALL existing service workers (clean slate)
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          var unregisterAll = registrations
            .filter(function (r) { return r.scope !== window.location.origin + '/'; })
            .map(function (r) {
              console.log('[SW] Unregistering old worker:', r.scope);
              return r.unregister();
            });
          return Promise.all(unregisterAll);
        }).then(function () {
          // Step 2: Register the new production service worker
          return navigator.serviceWorker.register('/sw.js', { scope: '/' });
        }).then(function (reg) {
          console.log('[SW] Registered:', reg.scope);

          // Step 3: Detect new waiting worker → prompt update
          if (reg.waiting) {
            showUpdateBanner();
          }
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version waiting — tell it to skip waiting
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

          // Step 4: When controller changes (new SW took over) show banner
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing) return;
            refreshing = true;
            showUpdateBanner();
          });
        }).catch(function (err) {
          console.warn('[SW] Registration failed:', err);
        });
      });
    })();
    </script>
  </body>
</html>
